name: Build and Test

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM CE 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: ./gradlew app:test

  build:
    name: Build fat JAR
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM CE 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build fat JAR
        run: ./gradlew app:shadowJar

      - name: Upload fat JAR
        uses: actions/upload-artifact@v4
        with:
          name: copilot-jetbrains-exporter-jar
          path: app/build/libs/copilot-jetbrains-exporter-*.jar
          retention-days: 7

  native:
    name: Native image on ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: copilot-jetbrains-exporter-linux-amd64
            binary: app/build/native/nativeCompile/copilot-jetbrains-exporter
          - os: macos-latest
            artifact: copilot-jetbrains-exporter-macos-amd64
            binary: app/build/native/nativeCompile/copilot-jetbrains-exporter
          - os: windows-latest
            artifact: copilot-jetbrains-exporter-windows-amd64
            binary: app/build/native/nativeCompile/copilot-jetbrains-exporter.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM CE 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build native image
        run: ./gradlew app:nativeCompile

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          retention-days: 7

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build, native]
    permissions:
      contents: write

    steps:
      - name: Download fat JAR
        uses: actions/download-artifact@v4
        with:
          name: copilot-jetbrains-exporter-jar
          path: dist/

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: copilot-jetbrains-exporter-linux-amd64
          path: dist/linux/

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: copilot-jetbrains-exporter-macos-amd64
          path: dist/macos/

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: copilot-jetbrains-exporter-windows-amd64
          path: dist/windows/

      - name: Rename binaries for release
        run: |
          mv dist/linux/copilot-jetbrains-exporter dist/copilot-jetbrains-exporter-linux-amd64
          mv dist/macos/copilot-jetbrains-exporter dist/copilot-jetbrains-exporter-macos-amd64
          mv dist/windows/copilot-jetbrains-exporter.exe dist/copilot-jetbrains-exporter-windows-amd64.exe
          ls -la dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/copilot-jetbrains-exporter-*.jar
            dist/copilot-jetbrains-exporter-linux-amd64
            dist/copilot-jetbrains-exporter-macos-amd64
            dist/copilot-jetbrains-exporter-windows-amd64.exe
          generate_release_notes: true
