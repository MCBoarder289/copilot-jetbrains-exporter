name: Build and Test

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run tests
        run: ./gradlew app:test

  build:
    name: Build fat JAR
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build fat JAR
        run: ./gradlew app:shadowJar

      - name: Upload fat JAR
        uses: actions/upload-artifact@v4
        with:
          name: copilot-jetbrains-exporter-jar
          path: app/build/libs/copilot-jetbrains-exporter-*.jar
          retention-days: 7

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download fat JAR
        uses: actions/download-artifact@v4
        with:
          name: copilot-jetbrains-exporter-jar

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: copilot-jetbrains-exporter-*.jar
          generate_release_notes: true
