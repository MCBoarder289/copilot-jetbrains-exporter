name: Build and Test

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and run tests
        run: ./gradlew app:test

      - name: Build fat JAR
        run: ./gradlew app:shadowJar

      - name: Upload fat JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-jetbrains-exporter-${{ matrix.os }}
          path: app/build/libs/copilot-jetbrains-exporter-*.jar

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build fat JAR
        run: ./gradlew app:shadowJar

      - name: Create release with JAR
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/libs/copilot-jetbrains-exporter-*.jar
          generate_release_notes: true
